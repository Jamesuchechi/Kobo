# ingestion/structured_properties.yaml
#
# Defines Kobo's custom structured properties on top of DataHub's standard
# Dataset entity. These must be registered with DataHub BEFORE
# emit_to_datahub.py sets any values, since DataHub validates structured
# property assignments against a registered definition.
#
# Register with:
#   datahub properties upsert -f ingestion/structured_properties.yaml
#
# Docs: https://docs.datahub.com/docs/api/tutorials/structured-properties

- id: io.kobo.track.isrc
  qualified_name: io.kobo.track.isrc
  display_name: ISRC
  type: string
  cardinality: SINGLE
  entity_types:
    - dataset
  description: International Standard Recording Code for a track.

- id: io.kobo.track.primaryArtist
  qualified_name: io.kobo.track.primaryArtist
  display_name: Primary Artist
  type: string
  cardinality: SINGLE
  entity_types:
    - dataset
  description: Primary credited artist for a track.

- id: io.kobo.track.totalSplitPct
  qualified_name: io.kobo.track.totalSplitPct
  display_name: Total Split %
  type: number
  cardinality: SINGLE
  entity_types:
    - dataset
  description: >
    Sum of all ownership_split percentages linked to this track. Should equal
    100. Values below 100 indicate unaccounted rights; values above 100
    indicate a conflicting/duplicate ownership claim.

- id: io.kobo.rightsHolder.holderType
  qualified_name: io.kobo.rightsHolder.holderType
  display_name: Rights Holder Type
  type: string
  cardinality: SINGLE
  entity_types:
    - dataset
  description: One of writer, publisher, label, performer.
  allowed_values:
    - value: writer
    - value: publisher
    - value: label
    - value: performer

- id: io.kobo.rightsHolder.payeeId
  qualified_name: io.kobo.rightsHolder.payeeId
  display_name: Payee ID
  type: string
  cardinality: SINGLE
  entity_types:
    - dataset
  description: Identifier used to match this rights holder against payout records.

- id: io.kobo.split.splitPct
  qualified_name: io.kobo.split.splitPct
  display_name: Split %
  type: number
  cardinality: SINGLE
  entity_types:
    - dataset
  description: Ownership percentage this split assigns to its rights holder.

- id: io.kobo.split.territory
  qualified_name: io.kobo.split.territory
  display_name: Split Territory
  type: string
  cardinality: SINGLE
  entity_types:
    - dataset
  description: Territory this split is valid for, or ALL for worldwide.

- id: io.kobo.split.rightType
  qualified_name: io.kobo.split.rightType
  display_name: Right Type
  type: string
  cardinality: SINGLE
  entity_types:
    - dataset
  description: One of mechanical, performance, sync.
  allowed_values:
    - value: mechanical
    - value: performance
    - value: sync

- id: io.kobo.split.licenseStart
  qualified_name: io.kobo.split.licenseStart
  display_name: License Start
  type: string
  cardinality: SINGLE
  entity_types:
    - dataset
  description: Date (YYYY-MM-DD) this split's license became active.

- id: io.kobo.split.licenseEnd
  qualified_name: io.kobo.split.licenseEnd
  display_name: License End
  type: string
  cardinality: SINGLE
  entity_types:
    - dataset
  description: Date (YYYY-MM-DD) this split's license expired. Empty means open-ended.

- id: io.kobo.event.eventType
  qualified_name: io.kobo.event.eventType
  display_name: Usage Event Type
  type: string
  cardinality: SINGLE
  entity_types:
    - dataset
  description: One of stream, play, sync.

- id: io.kobo.event.territory
  qualified_name: io.kobo.event.territory
  display_name: Usage Event Territory
  type: string
  cardinality: SINGLE
  entity_types:
    - dataset
  description: Territory where the usage event occurred.

- id: io.kobo.event.platform
  qualified_name: io.kobo.event.platform
  display_name: Platform
  type: string
  cardinality: SINGLE
  entity_types:
    - dataset
  description: DSP/platform the usage event occurred on.

- id: io.kobo.event.timestamp
  qualified_name: io.kobo.event.timestamp
  display_name: Event Timestamp
  type: string
  cardinality: SINGLE
  entity_types:
    - dataset
  description: ISO-8601 timestamp of the usage event.

- id: io.kobo.event.unitCount
  qualified_name: io.kobo.event.unitCount
  display_name: Unit Count
  type: number
  cardinality: SINGLE
  entity_types:
    - dataset
  description: Number of plays/streams/units in this usage event.

- id: io.kobo.event.eventValue
  qualified_name: io.kobo.event.eventValue
  display_name: Event Value
  type: number
  cardinality: SINGLE
  entity_types:
    - dataset
  description: Total gross value generated by this usage event, pre-split.

- id: io.kobo.payout.amountPaid
  qualified_name: io.kobo.payout.amountPaid
  display_name: Amount Paid
  type: number
  cardinality: SINGLE
  entity_types:
    - dataset
  description: Actual amount paid out for this record.

- id: io.kobo.payout.currency
  qualified_name: io.kobo.payout.currency
  display_name: Currency
  type: string
  cardinality: SINGLE
  entity_types:
    - dataset
  description: ISO currency code for the payout.

- id: io.kobo.payout.payeeId
  qualified_name: io.kobo.payout.payeeId
  display_name: Payout Payee ID
  type: string
  cardinality: SINGLE
  entity_types:
    - dataset
  description: Payee ID this payout was issued to. Compared against rights_holder payee IDs during reconciliation.

- id: io.kobo.payout.statementPeriod
  qualified_name: io.kobo.payout.statementPeriod
  display_name: Statement Period
  type: string
  cardinality: SINGLE
  entity_types:
    - dataset
  description: Royalty statement period (YYYY-MM) this payout belongs to.

# --- Reconciliation write-back properties (set by the agent, not ingestion) ---

- id: io.kobo.reconciliation.expectedAmount
  qualified_name: io.kobo.reconciliation.expectedAmount
  display_name: Expected Amount
  type: number
  cardinality: SINGLE
  entity_types:
    - dataset
  description: What the Kobo agent computed as the expected payout from ownership metadata.

- id: io.kobo.reconciliation.actualAmount
  qualified_name: io.kobo.reconciliation.actualAmount
  display_name: Actual Amount
  type: number
  cardinality: SINGLE
  entity_types:
    - dataset
  description: What was actually paid, as found in the payout record.

- id: io.kobo.reconciliation.delta
  qualified_name: io.kobo.reconciliation.delta
  display_name: Delta
  type: number
  cardinality: SINGLE
  entity_types:
    - dataset
  description: actualAmount minus expectedAmount.

- id: io.kobo.reconciliation.severity
  qualified_name: io.kobo.reconciliation.severity
  display_name: Reconciliation Severity
  type: string
  cardinality: SINGLE
  entity_types:
    - dataset
  description: Agent-assigned severity for a flagged mismatch.
  allowed_values:
    - value: low
    - value: medium
    - value: high